<div class="container d-flex justify-content-center align-items-center vh-100">

  <div class="card p-4 shadow" style="width: 350px;">

    <h4 class="text-center mb-3">Acesso à Entidade</h4>

    <form (ngSubmit)="validarEntity()">

      <div class="mb-3">
        <label class="form-label">Código</label>

        <input
          type="password"
          class="form-control"
          [(ngModel)]="entity"
          name="entity"
          placeholder="Informe o código"
          required
        />
      </div>

      <div class="d-grid">
        <button type="submit" class="btn btn-primary">
          Entrar
        </button>
      </div>

    </form>

    <!-- ERRO -->
    <div *ngIf="erro" class="alert alert-danger mt-3 text-center">
      Código incorreto
    </div>

  </div>

</div>
