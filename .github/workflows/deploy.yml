name: Deploy Angular to GitHub Pages

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci
        working-directory: condominio-app/frontend

      - name: Install Angular CLI
        run: npm install -g @angular/cli

      - name: Build Angular app
        run: ng build --base-href /condominio/
        working-directory: condominio-app/frontend

      - name: Move Angular dist to root docs folder
        run: |
          rm -rf docs
          mkdir docs
          cp -r condominio-app/frontend/dist/*/browser/* docs/
          echo "" > docs/.nojekyll

      - name: Create 404 redirect
        run: echo '<!DOCTYPE html><html><head><meta http-equiv="refresh" content="0; url=/condominio/" /></head><body></body></html>' > docs/404.html

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Auto deploy to GitHub Pages" || echo "No changes to commit"
          git push
